<svg viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C860;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D8D8D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape with padlock -->
  <g id="shield-lock">
    <!-- Shield body -->
    <path d="M 8 12 L 8 22 Q 8 30 16 35 Q 24 30 24 22 L 24 12 Z"
          fill="url(#goldGradient)" stroke="#9A7C0A" stroke-width="0.5"/>

    <!-- Padlock arc on top -->
    <path d="M 10 12 Q 10 8 16 8 Q 22 8 22 12"
          fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Inner lock mechanism - vertical bar -->
    <rect x="15" y="14" width="2" height="10" fill="#B8860B" opacity="0.8"/>

    <!-- "T" shape integrated into design -->
    <g id="t-letter">
      <!-- Horizontal bar of T -->
      <rect x="11" y="15" width="10" height="1.5" fill="#B8860B" opacity="0.7"/>
      <!-- Vertical bar of T -->
      <rect x="15" y="16.5" width="2" height="6" fill="#B8860B" opacity="0.7"/>
    </g>

    <!-- Shield highlight/shine -->
    <ellipse cx="14" cy="18" rx="2.5" ry="3" fill="#F0D980" opacity="0.6"/>
  </g>

  <!-- "TechLicense" text -->
  <text x="30" y="35" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="600"
        fill="url(#silverGradient)" letter-spacing="-0.3">
    <tspan>TechLicense</tspan>
  </text>

  <!-- Optional: thin accent line under text -->
  <line x1="30" y1="38" x2="130" y2="38" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6"/>
</svg>